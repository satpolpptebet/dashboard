  // =============== CALCULATE STATS ===============
  function getAge(dateString) {
    if(!dateString) return -1;
    const birthDate = new Date(dateString);
    if(isNaN(birthDate)) return -1;
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
      age--;
    }
    return age;
  }

  function calculateStats(data) {
     let stats = {
        total: 0, pns: 0, pppk: 0, pjlp: 0,
        umur: {
          '20-29': {pns:0, pppk:0, pjlp:0},
          '30-39': {pns:0, pppk:0, pjlp:0},
          '40-49': {pns:0, pppk:0, pjlp:0},
          '50-58': {pns:0, pppk:0, pjlp:0},
          '>=58': {pns:0, pppk:0, pjlp:0}
        },
        penempatan: {
          'TEBET BARAT': {pns:0, pppk:0, pjlp:0},
          'TEBET TIMUR': {pns:0, pppk:0, pjlp:0},
          'MANGGARAI SELATAN': {pns:0, pppk:0, pjlp:0},
          'KEBON BARU': {pns:0, pppk:0, pjlp:0},
          'BUKIT DURI': {pns:0, pppk:0, pjlp:0},
          'MENTENG DALAM': {pns:0, pppk:0, pjlp:0},
          'MANGGARAI': {pns:0, pppk:0, pjlp:0}
        },
        pendidikan: {
          'SMA/SMK': {pns:0, pppk:0, pjlp:0},
          'D3': {pns:0, pppk:0, pjlp:0},
          'S1': {pns:0, pppk:0, pjlp:0},
          'S2': {pns:0, pppk:0, pjlp:0}
        },
        golongan: {
          'Pengatur Muda Tk.I / II.b': 0,
          'Pengatur / II.c': 0,
          'Pengatur Tk.I / II.d': 0,
          'Penata Muda / III.a': 0,
          'Penata Muda Tk.I / III.b': 0,
          'Penata / III.c': 0,
          'Penata Tingkat I / III.d': 0
        }
     };

     data.forEach(item => {
       let type = (item.JENIS_PEGAWAI || '').toUpperCase();
       let tKey = null;
       if(type.includes('PNS')) { stats.pns++; tKey = 'pns'; }
       else if(type.includes('PPPK') || type.includes('P3K')) { stats.pppk++; tKey = 'pppk'; }
       else if(type.includes('PJLP')) { stats.pjlp++; tKey = 'pjlp'; }
       stats.total++;

       if(!tKey) return;

       // 1. Umur
       let age = getAge(item.TANGGAL_LAHIR);
       if(age >= 20 && age <= 29) stats.umur['20-29'][tKey]++;
       else if(age >= 30 && age <= 39) stats.umur['30-39'][tKey]++;
       else if(age >= 40 && age <= 49) stats.umur['40-49'][tKey]++;
       else if(age >= 50 && age < 58) stats.umur['50-58'][tKey]++;
       else if(age >= 58) stats.umur['>=58'][tKey]++;

       // 2. Penempatan
       let loc = (item.TEMPAT_TUGAS || '').toUpperCase();
       if(stats.penempatan[loc]) stats.penempatan[loc][tKey]++;

       // 3. Pendidikan
       let edu = (item.PENDIDIKAN_TERAKHIR || '').toUpperCase();
       if(edu.includes('SMA') || edu.includes('SMK')) stats.pendidikan['SMA/SMK'][tKey]++;
       else if(edu.includes('D3')) stats.pendidikan['D3'][tKey]++;
       else if(edu.includes('S1')) stats.pendidikan['S1'][tKey]++;
       else if(edu.includes('S2')) stats.pendidikan['S2'][tKey]++;

       // 4. Golongan (Khusus PNS)
       if(tKey === 'pns') {
          let gol = (item.PANGKAT || '');
          Object.keys(stats.golongan).forEach(k => {
             let roman = k.split('/')[1].trim();
             if(gol.includes(roman) || gol === k) {
                stats.golongan[k]++;
             }
          });
       }
     });

     return stats;
  }

     ss.innerHTML = `

        <div class="col-md-6">

            <div class="card-body p-0">
              <table class="table table-sm table-striped mb-0 text-center align-middle">
                <thead class="table-light"><tr><th class="text-start">Pendidikan</th><th>PNS</th><th>PPPK</th><th>PJLP</th><th>Total</th></tr></thead>
                <tbody>${pendHtml}</tbody>
              </table>
            </div>
          </div>

        <div class="col-md-6">
          <div class="card shadow-sm border-0 h-100">
            <div class="card-header bg-white fw-bold py-3">d. Golongan (Khusus PNS)</div>

              <table class="table table-sm table-striped mb-0 text-center align-middle">
                <thead class="table-light"><tr><th class="text-start">Golongan</th><th>Jumlah PNS</th></tr></thead>

              </table>

          </div>
        </div>
     `;
  }

         <button class="btn btn-primary px-4 shadow-sm" onclick="showForm()">+ Tambah Pegawai</button>

        <table class="table table-hover align-middle">

              <th>NRK</th>
              <th>Jabatan</th>

    loadData();
  }

  function loadUserView() {
    const container = document.getElementById('dynamicContent');
    container.innerHTML = `
      <div class="welcome-card shadow-sm mb-4">
        <h3>Halo, ${escapeHTML(currentUser.nama)}!</h3>
        <p class="mb-0 opacity-75">Silakan periksa dan perbarui data profil Anda di bawah ini jika terdapat perubahan.</p>
      </div>
      <div id="userProfileArea" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Mengambil data profil Anda...</p>
      </div>
    `;
    
    if (!IS_PROD) {
      setTimeout(() => {
        const myData = mockDB.find(i => i.NAMA.includes(currentUser.nama) || i.NAMA === 'STAFF USER');
        if (myData) renderUserForm(myData);
        else container.innerHTML = '<div class="alert alert-warning">Data profil Anda tidak ditemukan. Hubungi Admin.</div>';
      }, 800);
    } else {
      gasRun('getDataPegawai', sessionToken).then(res => {
        if (handleSessionExpired(res)) return;
        if (res.success) {
          const myData = res.data.find(i => i.NAMA === currentUser.nama || i.NRK === currentUser.username);
          if (myData) renderUserForm(myData);
          else document.getElementById('userProfileArea').innerHTML = '<div class="alert alert-warning">Data profil Anda tidak ditemukan di Database. Hubungi Admin.</div>';
        } else {
          Swal.fire('Error', res.message, 'error');
        }
      }).catch(err => Swal.fire('Error', err.message, 'error'));
    }
  }

  function renderUserForm(item) {
    const area = document.getElementById('userProfileArea');
    area.className = "";
    area.innerHTML = `
      <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
           <h5 class="fw-bold mb-0 text-primary"><i class="bi bi-pencil-square me-2"></i>Formulir Data Personil</h5>
           <button class="btn btn-success px-4" onclick="saveFromUserView()">Simpan Perubahan</button>
        </div>
        <form id="userEditForm">
           ${generateFormHtml(item, false)}
        </form>
      </div>
    `;
    
    const triggerTabList = [].slice.call(document.querySelectorAll('#formTabs a'));
    triggerTabList.forEach(function (triggerEl) {
      const tabTrigger = new bootstrap.Tab(triggerEl);
      triggerEl.addEventListener('click', function (e) { e.preventDefault(); tabTrigger.show(); });
    });
  }

  function validateFormData(data) {
    const emptyFields = Object.entries(data).filter(([key, value]) => !value || value.toString().trim() === "");
    return emptyFields.length === 0;
  }

  window.saveFromUserView = function() {
    if (!sessionToken) return window.handleLogout();
    const form = document.getElementById('userEditForm');
    const fd = new FormData(form);
    const data = Object.fromEntries(fd);
    
    if (!validateFormData(data)) {
      Swal.fire('Lengkapi Data', 'Seluruh kolom pada formulir (Hal 1 & Hal 2) wajib diisi!', 'warning');
      return;
    }
    handleSave(data);
  };

  function generateFormHtml(item, isAdm) {
    const opts = {
      pangkat: ['Pengatur Muda Tk.I / II.b', 'Pengatur / II.c', 'Pengatur Tk.I / II.d', 'Penata Muda / III.a', 'Penata Muda Tk.I / III.b', 'Penata / III.c', 'Penata Tingkat I / III.d', 'Pranata Trantibum / V', 'PJLP'],
      tugas: ['TEBET BARAT', 'TEBET TIMUR', 'MANGGARAI SELATAN', 'KEBON BARU', 'BUKIT DURI', 'MENTENG DALAM', 'MANGGARAI'],
      agama: ['ISLAM', 'KRISTEN', 'KATOLIK', 'HINDU', 'BUDHA'],
      pend: ['SMA/SMK', 'D3', 'S1', 'S2', 'S3'],
      gender: ['Laki-laki', 'Perempuan'],
      jenis: ['PNS', 'CPNS', 'PPPK', 'PJLP']
    };

    return `
        <ul class="nav nav-tabs mb-3 justify-content-center" id="formTabs" role="tablist">
          <li class="nav-item"><a class="nav-link active" id="tab1-link" data-bs-toggle="tab" href="#tab1">Hal 1: Kepegawaian</a></li>
          <li class="nav-item"><a class="nav-link" id="tab2-link" data-bs-toggle="tab" href="#tab2">Hal 2: Data Personal</a></li>
        </ul>
        <div class="text-start small px-2">
          <div class="tab-content">
            <div class="tab-pane fade show active" id="tab1">
              <div class="row g-3">
                <div class="col-md-6"><label class="form-label fw-bold">Nama Lengkap</label><input name="NAMA" class="form-control ${!isAdm?'form-disabled':''}" value="${escapeHTML(item?.NAMA||'')}" ${!isAdm?'readonly':''}></div>
                <div class="col-md-3"><label class="form-label fw-bold">NRK/NPJLP</label><input name="NRK" class="form-control" value="${escapeHTML(item?.NRK||'')}"></div>
                <div class="col-md-3"><label class="form-label fw-bold">NIP</label><input name="NIP" class="form-control" value="${escapeHTML(item?.NIP||'')}"></div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Jenis Pegawai</label>
                  <select name="JENIS_PEGAWAI" class="form-select ${!isAdm?'form-disabled':''}" ${!isAdm?'disabled':''}>
                    <option value="">Pilih Jenis...</option>
                    ${opts.jenis.map(o=>`<option value="${o}" ${item?.JENIS_PEGAWAI==o?'selected':''}>${o}</option>`).join('')}
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Pangkat / Golongan</label>
                  <select name="PANGKAT" class="form-select">
                    <option value="">Pilih Pangkat...</option>
                    ${opts.pangkat.map(o=>`<option value="${o}" ${item?.PANGKAT==o?'selected':''}>${o}</option>`).join('')}
                  </select>
                </div>
                <div class="col-md-4"><label class="form-label fw-bold">TMT Golongan</label><input type="date" name="TMT_GOL" class="form-control" value="${escapeHTML(item?.TMT_GOL||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Jabatan (Gunakan Huruf Kapital)</label><input name="JABATAN" class="form-control" value="${escapeHTML(item?.JABATAN||'')}"></div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Tempat Tugas</label>
                  <select name="TEMPAT_TUGAS" class="form-select">
                    <option value="">Pilih Tempat Tugas...</option>
                    ${opts.tugas.map(o=>`<option value="${o}" ${item?.TEMPAT_TUGAS==o?'selected':''}>${o}</option>`).join('')}
                  </select>
                </div>
                <div class="col-md-12"><label class="form-label fw-bold">Keterangan</label><input name="KETERANGAN" class="form-control ${!isAdm?'form-disabled':''}" value="${escapeHTML(item?.KETERANGAN||'AKTIF')}" ${!isAdm?'readonly':''}></div>
                
                <!-- Kolom Baru Untuk Eksisting Print -->
                <div class="col-md-12 mt-4 border-top pt-3"><h6 class="fw-bold text-primary mb-0">Kolom Data Eksisting (Untuk Print)</h6></div>
                <div class="col-md-6"><label class="form-label fw-bold">Bagian / Bidang</label><input name="BAGIAN_BIDANG" class="form-control" value="${escapeHTML(item?.BAGIAN_BIDANG||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Subbidang / Subbagian</label><input name="SUBBIDANG_SUBBAGIAN" class="form-control" value="${escapeHTML(item?.SUBBIDANG_SUBBAGIAN||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Jabatan Sesuai Permenpan 41</label><input name="JABATAN_PERMENPAN" class="form-control" value="${escapeHTML(item?.JABATAN_PERMENPAN||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Jabatan Sesuai Pergub</label><input name="JABATAN_PERGUB" class="form-control" value="${escapeHTML(item?.JABATAN_PERGUB||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">ABK</label><input type="number" name="ABK" class="form-control" value="${escapeHTML(item?.ABK||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Existing</label><input type="number" name="EXISTING" class="form-control" value="${escapeHTML(item?.EXISTING||'')}"></div>
              </div>
            </div>
            <div class="tab-pane fade" id="tab2">
              <div class="row g-3">
                <div class="col-md-6"><label class="form-label fw-bold">NIK (No. KTP)</label><input name="NIK" class="form-control" value="${escapeHTML(item?.NIK||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">NPWP (tanpa tanda titik)</label><input name="NPWP" class="form-control" value="${escapeHTML(item?.NPWP||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Tempat Lahir</label><input name="TEMPAT_LAHIR" class="form-control" value="${escapeHTML(item?.TEMPAT_LAHIR||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">Tanggal Lahir</label><input type="date" name="TANGGAL_LAHIR" class="form-control" value="${escapeHTML(item?.TANGGAL_LAHIR||'')}"></div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Jenis Kelamin</label>
                  <select name="JENIS_KELAMIN" class="form-select">
                    <option value="">Pilih...</option>
                    ${opts.gender.map(o=>`<option value="${o}" ${item?.JENIS_KELAMIN==o||(o.startsWith(item?.JENIS_KELAMIN))?'selected':''}>${o}</option>`).join('')}
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Agama</label>
                  <select name="AGAMA" class="form-select">
                    <option value="">Pilih Agama...</option>
                    ${opts.agama.map(o=>`<option value="${o}" ${item?.AGAMA==o?'selected':''}>${o}</option>`).join('')}
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Pendidikan Terakhir</label>
                  <select name="PENDIDIKAN_TERAKHIR" class="form-select">
                    <option value="">Pilih Pendidikan...</option>
                    ${opts.pend.map(o=>`<option value="${o}" ${item?.PENDIDIKAN_TERAKHIR==o?'selected':''}>${o}</option>`).join('')}
                  </select>
                </div>
                <div class="col-md-6"><label class="form-label fw-bold">Norek Bank Jakarta</label><input name="NO_REK" class="form-control" value="${escapeHTML(item?.NO_REK||'')}"></div>
                <div class="col-md-6"><label class="form-label fw-bold">No. WhatsApp</label><input name="NO_WHATSAPP" class="form-control" value="${escapeHTML(item?.NO_WHATSAPP||'')}"></div>
                <div class="col-md-12"><label class="form-label fw-bold">Alamat Rumah (Gunakan Huruf Kapital)</label><textarea name="ALAMAT_RUMAH" class="form-control" rows="2">${escapeHTML(item?.ALAMAT_RUMAH||'')}</textarea></div>
              </div>
            </div>
          </div>
        </div>
    `;
  }

  window.togglePass = function(id) {
    const input = document.getElementById(id);
    const icon = document.getElementById(id + '-icon');
    if (input.type === "password") {
      input.type = "text";
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      input.type = "password";
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  };

  window.showChangePassword = function() {
    if (!sessionToken) return window.handleLogout();
    Swal.fire({
      title: 'Ubah Password Akun',
      width: '400px',
      confirmButtonText: 'Update Password',
      cancelButtonText: 'Batal',
      showCancelButton: true,
      html: `
        <div class="text-start small">
          <div class="mb-3 relative">
            <label class="form-label fw-bold">Password Lama :</label>
            <input type="password" id="pOld" class="form-control" placeholder="Masukkan password lama">
            <i class="bi bi-eye pass-toggle" id="pOld-icon" onclick="togglePass('pOld')"></i>
          </div>
          <div class="mb-3 relative">
            <label class="form-label fw-bold">Password Baru :</label>
            <input type="password" id="pNew" class="form-control" placeholder="Minimal 6 karakter">
            <i class="bi bi-eye pass-toggle" id="pNew-icon" onclick="togglePass('pNew')"></i>
          </div>
          <div class="mb-3 relative">
            <label class="form-label fw-bold">Ulang Password Baru :</label>
            <input type="password" id="pConf" class="form-control" placeholder="Ulangi password baru">
            <i class="bi bi-eye pass-toggle" id="pConf-icon" onclick="togglePass('pConf')"></i>
          </div>
        </div>
      `,
      preConfirm: () => {
        const old = document.getElementById('pOld').value;
        const n = document.getElementById('pNew').value;
        const c = document.getElementById('pConf').value;
        if (!old || !n || !c) return Swal.showValidationMessage('Harap isi semua field!');
        if (n.length < 6) return Swal.showValidationMessage('Password baru minimal 6 karakter!');
        if (n !== c) return Swal.showValidationMessage('Konfirmasi password tidak cocok!');
        return { old: old, n: n };
      }
    }).then(r => {
      if (r.isConfirmed) {
        startLoading('Memperbarui Password...');
        if (!IS_PROD) {
          setTimeout(() => {
            endLoading();
            Swal.fire('Berhasil', 'Password telah diperbarui (Simulasi)', 'success');
          }, 1500);
        } else {
          gasRun('changeUserPassword', sessionToken, r.value).then(res => {
            endLoading();
            if (handleSessionExpired(res)) return;
            if (res.success) Swal.fire('Berhasil', 'Password Anda telah diganti.', 'success');
            else Swal.fire('Gagal', res.message, 'error');
          }).catch(err => {
            endLoading(); Swal.fire('Error', err.message, 'error');
          });
        }
      }
    });
  };

  function loadData() {
    const tb = document.getElementById('tableBody');
    if(!tb) return;
    tb.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted small">Memuat data...</td></tr>';
    
    if (!IS_PROD) {
      setTimeout(() => renderTable(mockDB), 600);
    } else {
      gasRun('getDataPegawai', sessionToken).then(res => {
        if (handleSessionExpired(res)) return;
        if (res.success) renderTable(res.data);
        else Swal.fire('Error', res.message, 'error');
      }).catch(err => {
        tb.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-danger">Gagal memuat data</td></tr>';
      });
    }
  }

  function renderTable(data) {
    const tb = document.getElementById('tableBody');
    if (!tb) return;
    if (!data || data.length === 0) {
      tb.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Belum ada data pegawai.</td></tr>';
      return;
    }
    tb.innerHTML = data.map(i => `
      <tr>
        <td class="fw-bold">${escapeHTML(i.NAMA)}</td>
        <td><code>${escapeHTML(i.NRK)}</code></td>
        <td>${escapeHTML(i.JABATAN)}</td>
        <td><span class="text-secondary small">${escapeHTML(i.TEMPAT_TUGAS)}</span></td>
        <td><span class="badge ${i.KETERANGAN=='AKTIF'?'bg-success':'bg-secondary'} px-3">${escapeHTML(i.KETERANGAN)}</span></td>
        <td class="text-center"><button class="btn btn-sm btn-outline-primary px-3" onclick='showForm(${JSON.stringify(i).replace(/'/g, "&#39;")})'>Edit</button></td>
      </tr>
    `).join('');

    // Tambahan render untuk Admin views
    if (currentUser && currentUser.role === 'Admin') {
       renderDashboardStats(data);
       renderStatistik(data);
       renderEksisting(data);
    }
  }

  window.showForm = function(item = null) {
    if (!sessionToken) return window.handleLogout();
    Swal.fire({
      title: item ? 'Edit Profil Pegawai' : 'Tambah Pegawai Baru',
      width: '900px',
      confirmButtonText: 'Simpan Perubahan',
      cancelButtonText: 'Batal',
      showCancelButton: true,
      html: `
        <div class="text-center mb-3"><img src="${LOGO_URL}" height="50"></div>
        <form id="pForm">
          ${generateFormHtml(item, true)}
        </form>
      `,
      didOpen: () => {
        const triggerTabList = [].slice.call(document.querySelectorAll('#formTabs a'));
        triggerTabList.forEach(function (triggerEl) {
          const tabTrigger = new bootstrap.Tab(triggerEl);
          triggerEl.addEventListener('click', function (e) { e.preventDefault(); tabTrigger.show(); });
        });
      },
      preConfirm: () => {
        const form = document.getElementById('pForm');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData);
        if (!validateFormData(data)) {
          Swal.showValidationMessage('Seluruh kolom pada formulir (Hal 1 & Hal 2) wajib diisi!');
          return false;
        }
        return data;
      }
    }).then(r => r.isConfirmed && handleSave(r.value));
  };

  function handleSave(p) {
    startLoading('Menyimpan Data...');
    if (!IS_PROD) {
      setTimeout(() => {
        let idx = mockDB.findIndex(m => (m.NRK && m.NRK == p.NRK) || (m.NIK && m.NIK == p.NIK));
        if(idx > -1) mockDB[idx] = {...mockDB[idx], ...p}; else mockDB.push(p);
        endLoading(); 
        Swal.fire('Tersimpan', 'Data berhasil diperbarui', 'success'); 
        if(currentUser.role === 'Admin') loadData(); else loadUserView();
      }, 1000);
    } else {
      gasRun('simpanData', sessionToken, p).then(res => {
        endLoading();
        if (handleSessionExpired(res)) return;
        if (res.success) {
          Swal.fire('Tersimpan', 'Data berhasil diperbarui', 'success'); 
          if(currentUser.role === 'Admin') loadData(); else loadUserView();
        } else {
          Swal.fire('Gagal', res.message, 'error');
        }
      }).catch(err => {
        endLoading(); Swal.fire('Error', err.toString(), 'error');
      });
    }
  }

  window.handleLogout = function(isExpired = false) { 
    if (IS_PROD && sessionToken) google.script.run.destroySession(sessionToken);
    sessionToken = null; 
    currentUser = null; 
    if(isExpired) Swal.fire('Session Expired', 'Sesi Anda telah berakhir, silakan login ulang.', 'warning');
    checkLoginState(); 
  };

  document.addEventListener('DOMContentLoaded', function() {
    createBubbles(); 
    checkLoginState(); 
    console.log('App generated using GAS WebApp Builder');
  });

})();
</script>
</body>
